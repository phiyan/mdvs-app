<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDVisualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="marked.min.js"></script>
</head>
<body>
    <div id="wrapper">
        <div id="content">
            <div id="welcome">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <h2>Open a Markdown file</h2>
                <p>Drag &amp; drop a <code>.md</code> file here, or use <strong>File › Open</strong></p>
            </div>
        </div>
    </div>
    <script>
        marked.setOptions({
            gfm: true,
            breaks: false
        });

        window.renderMarkdown = function(base64) {
            var md = decodeURIComponent(escape(atob(base64)));
            var html = marked.parse(md);
            var content = document.getElementById('content');
            content.innerHTML = html;
            content.classList.remove('empty');
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
